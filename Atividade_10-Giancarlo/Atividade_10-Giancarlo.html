<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8">
        <title>Atividade 10</title>
    </head>

    <body>
        <div class="f1">
            <img src="img1.jfif">
        </div>
        
        <div class="f2">
            <img src="img2.jfif">
        </div>

        <div class="f3">
            <img src="img3.jfif">
        </div>

        <div class="f4">
            <img src="img4.jfif">
        </div>

        <div class="f5">
            <img src="img5.jfif">
        </div>

        <div class="f6">
            <img src="img6.jfif">
        </div>
    </body>

    <style>


        body{
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: (6, 1fr);
            padding: 10px;
            gap: 10px;
        }

        img{
            border: 3px solid royalblue;
            width: 100%;
            height: 100%;
            display: block;
        }
        .f1{
            grid-column-start: 1;
            grid-column-end: 2;
            grid-row-start: 1;
            grid-row-end: 2;
        }
        .f2{
            grid-column-start: 2;
            grid-column-end: 3;
            grid-row-start: 1;
            grid-row-end: 2;
        }
        .f3{
            grid-column-start: 3;
            grid-column-end: 5;
            grid-row-start: 1;
            grid-row-end: 3;
        }
        .f4{
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 2;
            grid-row-end: 3;
        }
        .f5{
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 3;
            grid-row-end: 4;
        }
        .f6{
            grid-column-start: 3;
            grid-column-end: 5;
            grid-row-start: 3;
            grid-row-end: 4;
        }

        

    </style>

</html>
